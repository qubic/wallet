<ng-container *transloco="let t">
  <div class="buy-container">
    <div class="buy-header">
      <h1>{{ t("buyComponent.title") }}</h1>
      <div class="address-selector" *ngIf="getWritableSeeds().length > 1">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>{{ t("buyComponent.selectAddress") }}</mat-label>
          <mat-select [(value)]="selectedAddress" (selectionChange)="onAddressChange()" panelClass="full-width">
            <mat-select-trigger>
              <span *ngIf="selectedAddress && getSelectedSeed()">
                {{ getSelectedSeed() | seedDisplay: { compact: true, currencyLabel: t('general.currency') } }}
              </span>
            </mat-select-trigger>
            <mat-option *ngFor="let seed of getWritableSeeds()" [value]="seed.publicId" class="custom-mat-option">
              {{ seed | seedFirstLine }}<br />{{ seed | seedSecondLine: t('general.currency') }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>
    <!-- Banxa iframe permissions per https://docs.banxa.com/docs/referral-link
         Required: payment, encrypted-media, microphone, camera, midi
         microphone/camera are used for KYC identity verification (selfie, document scan) -->
    <div class="iframe-wrapper" *ngIf="banxaUrl">
      <iframe
        [src]="banxaUrl"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation-by-user-activation"
        allow="payment; encrypted-media; microphone; camera; midi"
        frameborder="0"
        class="banxa-iframe"
      ></iframe>
    </div>
    <div *ngIf="getWritableSeeds().length === 0" class="empty-state">{{ t("buyComponent.noAddresses") }}</div>
  </div>
</ng-container>
